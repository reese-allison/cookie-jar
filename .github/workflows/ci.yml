name: CI

on:
  push:
    branches: [main]
  pull_request:

# A new push to a PR cancels any prior in-progress run for the same ref —
# no point burning CI minutes on stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.12

jobs:
  lint:
    name: Lint, format, dead-code, coverage gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # `biome check` covers both lint and format in one pass.
      - name: Lint and format (biome)
        run: bun run lint
      - name: Dead-code scan (knip)
        run: bun run knip
      # Coverage gate: every file under components/, hooks/, lib/, stores/
      # must have a mirrored test (see scripts/find-missing-tests.mjs).
      - name: Test-coverage gate (every component/hook/lib/store has a test)
        run: bun run test:missing
      # NB: `db:migrate:check` lives in the deploy pipeline, not here. It
      # diffs the migrations directory against pgmigrations in the target
      # database — a feature-branch CI bootstraps a fresh DB so nothing is
      # ever "pending," making the check a no-op. Run it before deploys
      # to staging/prod, where the diff is meaningful.

  build:
    name: Build (client + server typecheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # `bun run build` runs `tsc -b` (typechecks server + shared) then
      # `vite build` (typechecks + bundles client). One command covers both.
      - name: Typecheck and build
        run: bun run build

  test:
    name: Vitest (unit + integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cookie_jar
          POSTGRES_USER: cookie_jar
          POSTGRES_PASSWORD: cookie_jar_dev
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cookie_jar -d cookie_jar"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://cookie_jar:cookie_jar_dev@localhost:5432/cookie_jar
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      # `auth.ts` requires this in any non-development/non-test NODE_ENV.
      # Tests already set NODE_ENV=test, but keeping a value here insulates
      # us from any helper that re-asserts it during test setup.
      BETTER_AUTH_SECRET: ci-not-a-real-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # docker-compose mounts schema.sql via initdb on first boot locally.
      # The CI postgres service container starts empty, so we use the same
      # bootstrap script the production deploy runs: it applies schema.sql,
      # marks every existing migration as already applied (schema.sql is
      # the cumulative target state — replaying migrations would collide
      # on auto-named constraints like `notes_style_check`), then runs
      # node-pg-migrate up to pick up any genuinely new migrations.
      - name: Bootstrap database (schema.sql + migrations)
        run: node scripts/bootstrap-and-migrate.mjs
      - name: Run Vitest suite
        run: bun run test:run

  lighthouse:
    name: Lighthouse (sandboxed)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # Builds the Dockerfile.lighthouse image (pinned Chromium + dist),
      # runs the audit inside the container, fails if any category drops
      # below the green threshold (0.9 by default).
      - name: Build sandbox + run audit
        run: bun run test:lighthouse
