<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Cookie Jar">
  <rect width="64" height="64" rx="14" fill="#fdfbf7"/>
  <!-- Jar body -->
  <rect x="16" y="20" width="32" height="34" rx="6" fill="#ffffff" stroke="#c67b5c" stroke-width="2.5"/>
  <!-- Jar rim -->
  <rect x="14" y="16" width="36" height="6" rx="3" fill="#c67b5c"/>
  <!-- Cork / lid top -->
  <rect x="22" y="10" width="20" height="8" rx="3" fill="#a15419"/>
  <!-- Tiny note inside -->
  <rect x="24" y="32" width="16" height="14" rx="1.5" fill="#fef9c3" transform="rotate(-6 32 39)"/>
</svg>
