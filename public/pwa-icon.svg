    <rect x="192" y="256" width="128" height="112" rx="10" fill="#fef9c3"/>
    <line x1="208" y1="284" x2="304" y2="284" stroke="#c67b5c" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="208" y1="308" x2="296" y2="308" stroke="#c67b5c" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="208" y1="332" x2="280" y2="332" stroke="#c67b5c" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>
