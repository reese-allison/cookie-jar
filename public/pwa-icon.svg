<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Cookie Jar">
  <rect width="512" height="512" rx="96" fill="#fdfbf7"/>
  <!-- Jar body -->
  <rect x="128" y="160" width="256" height="272" rx="48" fill="#ffffff" stroke="#c67b5c" stroke-width="18"/>
  <!-- Jar rim -->
